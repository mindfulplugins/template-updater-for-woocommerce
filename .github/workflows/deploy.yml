name: Deploy to Freemius

on:
  push:
    tags:
      - 'v*'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Download Freemius SDK
        run: |
          curl -sL https://github.com/Freemius/wordpress-sdk/archive/refs/heads/master.zip -o freemius-sdk.zip
          unzip -q freemius-sdk.zip
          mkdir -p vendor/freemius
          cp -r wordpress-sdk-master/. vendor/freemius/
          rm -rf freemius-sdk.zip wordpress-sdk-master

      - name: Build ZIP
        run: |
          mkdir -p build
          zip -r build/template-updater-for-woocommerce.zip . \
            --exclude "*.git*" \
            --exclude "build/*" \
            --exclude "*.zip" \
            --exclude "*.log" \
            --exclude ".github/*"

      - name: Deploy to Freemius
        uses: buttonizer/freemius-deploy@v0.1.3
        with:
          file_name: build/template-updater-for-woocommerce.zip
          version: ${{ steps.version.outputs.VERSION }}
          release_mode: released
        env:
          PUBLIC_KEY: ${{ secrets.FREEMIUS_PUBLIC_KEY }}
          SECRET_KEY: ${{ secrets.FREEMIUS_SECRET_KEY }}
          DEV_ID: 30325
          PLUGIN_ID: 25855
          PLUGIN_SLUG: template-updater-for-woocommerce

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/template-updater-for-woocommerce.zip
          generate_release_notes: true
